services:
  postgres:
    image: postgres:16-alpine
    container_name: notifications_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notifications}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notifications_secret}
      POSTGRES_DB: ${POSTGRES_DB:-notifications_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-notifications}']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notifications_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-notifications}:${POSTGRES_PASSWORD:-notifications_secret}@postgres:5432/${POSTGRES_DB:-notifications_db}
      PORT: 3000
      LOG_LEVEL: info
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
